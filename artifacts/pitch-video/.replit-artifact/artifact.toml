kind = "video"
previewPath = "/pitch-video/"
title = "Lumio – Startup Pitch Video"
version = "1.0.0"
id = "artifacts/pitch-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pitch-video/" ]
localPort = 18425

[services.development]
run = "pnpm --filter @workspace/pitch-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pitch-video", "run", "build" ]
publicDir = "artifacts/pitch-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18425"
BASE_PATH = "/pitch-video/"
